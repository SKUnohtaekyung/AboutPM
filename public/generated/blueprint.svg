<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#A259FF" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  
  <!-- Blueprint Grid Background -->
  <rect width="200" height="200" fill="url(#grid)"/>
  
  <!-- Glowing wireframe structure being drawn -->
  <rect x="50" y="50" width="80" height="60" fill="none" stroke="#00F0FF" stroke-width="2"/>
  <rect x="60" y="60" width="60" height="40" fill="none" stroke="#35244A" stroke-width="2"/>
  
  <!-- Architecture Anchor Nodes -->
  <circle cx="50" cy="50" r="4" fill="#A259FF">
     <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="130" cy="50" r="4" fill="#00F0FF"/>
  <circle cx="50" cy="110" r="4" fill="#00F0FF"/>
  <circle cx="130" cy="110" r="4" fill="#A259FF">
     <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="1s"/>
  </circle>
  
  <!-- Drafting Compass Arc (Animated tracing) -->
  <path d="M50 50 A 80 80 0 0 1 130 50" fill="none" stroke="#00F0FF" stroke-width="1.5" stroke-dasharray="10 4">
    <animate attributeName="stroke-dashoffset" values="50;0" dur="3s" repeatCount="indefinite"/>
  </path>
  
  <!-- Drafting Compass Tool Structure -->
  <circle cx="90" cy="20" r="6" fill="#FBF8FF" stroke="#35244A" stroke-width="2"/>
  <path d="M90 20 L50 50" stroke="#35244A" stroke-width="4" stroke-linecap="round"/>
  <path d="M90 20 L130 50" stroke="#A259FF" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Measurement dashed line -->
  <path d="M50 120 L130 120" stroke="#FBF8FF" stroke-width="1" stroke-dasharray="4 4" opacity="0.5"/>
  <text x="80" y="132" fill="#FBF8FF" font-size="10" opacity="0.6" font-family="sans-serif">Wireframe X-1</text>
</svg>
