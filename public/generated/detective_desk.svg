<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="transparent"/>
  
  <!-- Abstract blueprint scattered on desk -->
  <rect x="40" y="80" width="80" height="60" fill="none" stroke="#35244A" stroke-width="2" transform="rotate(-15 80 110)"/>
  <rect x="70" y="70" width="80" height="60" fill="none" stroke="#35244A" stroke-width="2" transform="rotate(20 110 100)"/>

  <!-- Magnifying Glass Base -->
  <circle cx="100" cy="80" r="45" fill="#1A1125" stroke="#00F0FF" stroke-width="4"/>
  
  <!-- Scanning Radar inside Glass -->
  <circle cx="100" cy="80" r="35" fill="none" stroke="#A259FF" stroke-width="2" stroke-dasharray="6 6">
    <animateTransform attributeName="transform" type="rotate" from="0 100 80" to="360 100 80" dur="10s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Glass Reflection -->
  <path d="M70 50 A 40 40 0 0 1 120 45" fill="none" stroke="#FBF8FF" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Magnifying Handle -->
  <path d="M130 110 L160 150" stroke="#00F0FF" stroke-width="12" stroke-linecap="round"/>
  <path d="M130 110 L160 150" stroke="#35244A" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Discovered Hidden Data Points (Pop inside the glass only) -->
  <circle cx="90" cy="70" r="3" fill="#FBF8FF">
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="110" cy="90" r="5" fill="#00F0FF">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="85" cy="95" r="4" fill="#A259FF">
    <animate attributeName="opacity" values="1;0;1" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
