<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="transparent"/>
  
  <g transform="translate(100, 60)">
    <!-- Scale Base -->
    <path d="M 290 150 L 310 150 L 305 80 L 295 80 Z" fill="#35244A"/>
    <path d="M 270 150 L 330 150" stroke="#00F0FF" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Balance Beam (Animated to tilt right slightly) -->
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0 300 80; 5 300 80; -2 300 80; 0 300 80" dur="4s" repeatCount="indefinite"/>
      <path d="M 100 80 L 500 80" stroke="#FBF8FF" stroke-width="6" stroke-linecap="round"/>
      <circle cx="300" cy="80" r="8" fill="#00F0FF"/>
      
      <!-- Left Side (CAC) -->
      <path d="M 100 80 L 100 120" stroke="#35244A" stroke-width="3"/>
      <rect x="70" y="120" width="60" height="40" fill="#1A1125" stroke="#A259FF" stroke-width="2"/>
      <text x="100" y="145" fill="#A259FF" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">CAC</text>
      <text x="100" y="175" fill="#FBF8FF" font-family="sans-serif" font-size="12" text-anchor="middle" opacity="0.6">(고객 획득 비용)</text>

      <!-- Right Side (LTV) -->
      <path d="M 500 80 L 500 140" stroke="#35244A" stroke-width="3"/>
      <rect x="460" y="140" width="80" height="60" fill="#1A1125" stroke="#00F0FF" stroke-width="3"/>
      <text x="500" y="175" fill="#00F0FF" font-family="sans-serif" font-size="20" font-weight="bold" text-anchor="middle">LTV</text>
      <text x="500" y="215" fill="#FBF8FF" font-family="sans-serif" font-size="12" text-anchor="middle" opacity="0.6">(고객 생애 가치)</text>
      <circle cx="500" cy="140" r="30" fill="#00F0FF" opacity="0.1">
         <animate attributeName="r" values="30;50;30" dur="2s" repeatCount="indefinite"/>
      </circle>
    </g>
    
    <!-- Equation Text -->
    <text x="300" y="20" fill="#FBF8FF" font-family="sans-serif" font-size="24" font-weight="bold" text-anchor="middle">지속 가능한 비즈니스의 대원칙</text>
    <text x="300" y="45" fill="#00F0FF" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle">LTV > 3 × CAC</text>
  </g>
</svg>
