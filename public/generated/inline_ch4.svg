<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="transparent"/>
  
  <!-- Flowchart Paths -->
  <path d="M 120 125 L 250 125" stroke="#A259FF" stroke-width="3" fill="none"/>
  <path d="M 330 125 L 450 125" stroke="#35244A" stroke-width="3" fill="none"/>
  <path d="M 450 125 L 450 60 L 500 60" stroke="#00F0FF" stroke-width="3" fill="none"/>
  <path d="M 450 125 L 450 190 L 500 190" stroke="#A259FF" stroke-width="3" fill="none"/>
  <path d="M 620 60 L 680 60" stroke="#00F0FF" stroke-width="3" fill="none" stroke-dasharray="6 6"/>
  
  <!-- Data packets animating along paths -->
  <circle cx="120" cy="125" r="4" fill="#00F0FF">
    <animate attributeName="cx" values="120;250" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- Start Node -->
  <rect x="40" y="105" width="80" height="40" rx="20" fill="#1A1125" stroke="#FBF8FF" stroke-width="2"/>
  <text x="80" y="130" fill="#FBF8FF" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">진입</text>

  <!-- Process Node -->
  <rect x="250" y="100" width="80" height="50" fill="#35244A" stroke="#A259FF" stroke-width="2"/>
  <text x="290" y="130" fill="#FBF8FF" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">인증 요청</text>

  <!-- Decision Diamond -->
  <polygon points="450,90 490,125 450,160 410,125" fill="#1A1125" stroke="#00F0FF" stroke-width="2"/>
  <text x="450" y="130" fill="#00F0FF" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">성공?</text>

  <!-- Success End -->
  <rect x="500" y="40" width="120" height="40" rx="5" fill="#00F0FF" opacity="0.1"/>
  <rect x="500" y="40" width="120" height="40" rx="5" fill="none" stroke="#00F0FF" stroke-width="2"/>
  <text x="560" y="65" fill="#00F0FF" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">대시보드 노출</text>

  <!-- Fail End -->
  <rect x="500" y="170" width="120" height="40" rx="5" fill="#1A1125" stroke="#A259FF" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="560" y="195" fill="#A259FF" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">에러 메시지</text>

  <!-- System Backend -->
  <rect x="680" y="30" width="80" height="60" fill="#35244A"/>
  <text x="720" y="65" fill="#FBF8FF" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle">DB 저장</text>
</svg>
