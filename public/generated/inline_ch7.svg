<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="transparent"/>
  
  <g transform="translate(100, 125)">
    <!-- Backlog Column -->
    <rect x="-60" y="-80" width="80" height="160" fill="#1A1125" stroke="#35244A" stroke-width="3" rx="8"/>
    <text x="-20" y="-95" fill="#FBF8FF" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Backlog</text>
    
    <rect x="-50" y="-60" width="60" height="20" fill="#35244A" rx="4"/>
    <rect x="-50" y="-30" width="60" height="20" fill="#35244A" rx="4"/>
    <rect x="-50" y="00" width="60" height="20" fill="#00F0FF" rx="4"/> <!-- Priority item -->
    <rect x="-50" y="30" width="60" height="20" fill="#35244A" rx="4"/>
    <rect x="-50" y="60" width="60" height="20" fill="#35244A" rx="4"/>

    <!-- Pull Arrow -->
    <path d="M 30 10 L 80 10" stroke="#00F0FF" stroke-width="4" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="8;0" dur="0.5s" repeatCount="indefinite"/>
    </path>
    <polygon points="80,0 95,10 80,20" fill="#00F0FF"/>

    <!-- Sprint Cycle (Infinity Loop / Circular) -->
    <path d="M 120 10 C 120 -80, 280 -80, 280 10 C 280 100, 120 100, 120 10" fill="none" stroke="#A259FF" stroke-width="6"/>
    
    <!-- Rotating Node on Sprint -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 200 10" to="360 200 10" dur="4s" repeatCount="indefinite"/>
      <circle cx="120" cy="10" r="10" fill="#00F0FF"/>
    </g>
    
    <text x="200" y="15" fill="#A259FF" font-family="sans-serif" font-size="20" font-weight="900" text-anchor="middle">Sprint (2 Weeks)</text>

    <!-- Release Arrow -->
    <path d="M 320 10 L 370 10" stroke="#00F0FF" stroke-width="4"/>
    <polygon points="370,0 385,10 370,20" fill="#00F0FF"/>

    <!-- Increment / Release -->
    <rect x="400" y="-40" width="80" height="80" fill="#1A1125" stroke="#00F0FF" stroke-width="3" rx="12"/>
    <text x="440" y="-55" fill="#00F0FF" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Release</text>
    <path d="M 425 -10 L 440 5 L 455 -10" fill="none" stroke="#00F0FF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 440 -10 L 440 25" fill="none" stroke="#00F0FF" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Retrospective Feedback Loop -->
    <path d="M 440 60 C 440 130, 200 130, 200 85" fill="none" stroke="#FBF8FF" stroke-width="2" stroke-dasharray="8 8" opacity="0.6"/>
    <polygon points="195,85 205,85 200,70" fill="#FBF8FF" opacity="0.6"/>
    <text x="320" y="115" fill="#FBF8FF" font-family="sans-serif" font-size="12" opacity="0.8">회고 (Retrospective)</text>
  </g>
</svg>
