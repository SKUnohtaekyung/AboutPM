<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250">
  <rect width="800" height="250" fill="transparent"/>
  
  <g transform="translate(150, 40)">
    <!-- Human Brain Area (Left) -->
    <path d="M 50 100 C 50 20, 150 20, 150 100 C 150 180, 50 180, 50 100 Z" fill="none" stroke="#00F0FF" stroke-width="3" opacity="0.4"/>
    <circle cx="90" cy="70" r="5" fill="#00F0FF"/>
    <circle cx="120" cy="90" r="4" fill="#00F0FF"/>
    <circle cx="80" cy="120" r="6" fill="#00F0FF"/>
    <circle cx="110" cy="130" r="4" fill="#00F0FF"/>
    <path d="M 90 70 L 120 90 L 110 130 L 80 120 Z" fill="none" stroke="#00F0FF" stroke-width="1.5" opacity="0.6"/>
    
    <text x="100" y="200" fill="#00F0FF" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">인간 (PM)</text>
    <text x="100" y="220" fill="#FBF8FF" font-family="sans-serif" font-size="12" text-anchor="middle" opacity="0.8">강점: 문제 정의, 판단력</text>

    <!-- AI Area (Right) -->
    <rect x="350" y="30" width="100" height="140" fill="none" stroke="#A259FF" stroke-width="3" rx="10" opacity="0.4"/>
    <line x1="370" y1="50" x2="430" y2="50" stroke="#A259FF" stroke-width="4"/>
    <line x1="370" y1="70" x2="400" y2="70" stroke="#A259FF" stroke-width="4"/>
    <line x1="370" y1="130" x2="430" y2="130" stroke="#A259FF" stroke-width="4"/>
    <line x1="370" y1="150" x2="410" y2="150" stroke="#A259FF" stroke-width="4"/>
    
    <text x="400" y="200" fill="#A259FF" font-family="sans-serif" font-size="16" font-weight="bold" text-anchor="middle">초거대 AI</text>
    <text x="400" y="220" fill="#FBF8FF" font-family="sans-serif" font-size="12" text-anchor="middle" opacity="0.8">강점: 데이터 산출, 추론</text>

    <!-- Center Interaction Point -->
    <path d="M 150 100 Q 250 50 350 100" fill="none" stroke="#35244A" stroke-width="4"/>
    <path d="M 350 100 Q 250 150 150 100" fill="none" stroke="#35244A" stroke-width="4"/>
    
    <circle cx="250" cy="100" r="30" fill="#1A1125" stroke="#FBF8FF" stroke-width="3">
      <animate attributeName="r" values="25;35;25" dur="1s" repeatCount="indefinite"/>
      <animate attributeName="stroke" values="#FBF8FF;#00F0FF;#A259FF;#FBF8FF" dur="3s" repeatCount="indefinite"/>
    </circle>
    
    <text x="250" y="105" fill="#FBF8FF" font-family="sans-serif" font-size="14" font-weight="900" text-anchor="middle">시너지</text>

    <!-- Data streams -->
    <circle cx="150" cy="100" r="3" fill="#00F0FF">
      <animate attributeName="cx" values="150;250" dur="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="350" cy="100" r="3" fill="#A259FF">
      <animate attributeName="cx" values="350;250" dur="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
