<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="transparent"/>
  
  <!-- Isometric Map Table Base -->
  <path d="M40 160 L160 160 L180 180 L20 180 Z" fill="#35244A" stroke="#A259FF" stroke-width="2"/>
  
  <!-- Holographic Grid Projection -->
  <path d="M60 140 L140 140 L160 160 L40 160 Z" fill="none" stroke="#00F0FF" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
  </path>
  
  <!-- Central Pulse Ring -->
  <circle cx="100" cy="80" r="20" fill="none" stroke="#00F0FF" stroke-width="2">
    <animate attributeName="r" values="10;30;10" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0;1" dur="4s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Network Nodes Floating -->
  <path d="M100 80 L140 50" stroke="#A259FF" stroke-width="2" stroke-dasharray="4 2">
    <animate attributeName="stroke-dashoffset" values="20;0" dur="3s" repeatCount="indefinite"/>
  </path>
  <circle cx="140" cy="50" r="6" fill="#A259FF">
    <animate attributeName="cy" values="45;55;45" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <path d="M100 80 L60 60" stroke="#A259FF" stroke-width="2"/>
  <circle cx="60" cy="60" r="4" fill="#00F0FF">
     <animate attributeName="cy" values="58;62;58" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Map Center Core -->
  <circle cx="100" cy="80" r="5" fill="#FBF8FF"/>
</svg>
