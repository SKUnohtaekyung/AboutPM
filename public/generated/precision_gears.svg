<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <rect width="200" height="200" fill="transparent"/>
  
  <!-- Large Gear (A259FF - Lilac) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 85 85" to="360 85 85" dur="10s" repeatCount="indefinite"/>
    <circle cx="85" cy="85" r="45" fill="none" stroke="#A259FF" stroke-width="12" stroke-dasharray="20 10"/>
    <circle cx="85" cy="85" r="35" fill="none" stroke="#35244A" stroke-width="6"/>
    <!-- Gear Spokes -->
    <path d="M85 45 L85 125 M45 85 L125 85 M55 55 L115 115 M55 115 L115 55" stroke="#35244A" stroke-width="3"/>
    <circle cx="85" cy="85" r="12" fill="#FBF8FF"/>
    <circle cx="85" cy="85" r="5" fill="#A259FF"/>
  </g>
  
  <!-- Small Interlocking Gear (00F0FF - Cyan) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 145 130" to="0 145 130" dur="10s" repeatCount="indefinite"/>
    <!-- Adjust center to interlock: approx distance = 45+25 = 70. dx=60, dy=45. dist=75, close enough visually with dash strokes -->
    <circle cx="145" cy="130" r="25" fill="none" stroke="#00F0FF" stroke-width="8" stroke-dasharray="10 6"/>
    <circle cx="145" cy="130" r="18" fill="none" stroke="#35244A" stroke-width="4"/>
    <path d="M145 105 L145 155 M120 130 L170 130" stroke="#35244A" stroke-width="2"/>
    <circle cx="145" cy="130" r="6" fill="#FBF8FF"/>
    <circle cx="145" cy="130" r="2" fill="#00F0FF"/>
  </g>
</svg>
